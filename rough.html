<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Registration Form</title>

</head>
<style>
     
</style>
<body>


<h2>Student Registration Form</h2>

<form action="register.php" method="post">

<label>Full Name</label>
<input type="text" name="fullname" placeholder="Enter your name" ><br><br>

<label>Email</label>
<input type="email" name="email" placeholder="Enter your email"><br><br>

<label>Password</label>
<input type="password" name="password" minlength="6" >
<br><br>
<label>Age</label>
<input type="number" name="age" min="16" max="60" ><br><br>

<label>Gender</label><br>
<input type="radio" name="gender" value="Male" > Male
<input type="radio" name="gender" value="Female"> Female
<br><br>

<label>Course:</label>
<select name="course" >
<option>Select Course</option>
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
<option>Python</option>
</select>
<br><br>
<label>Phone Number</label>
<input type="tel" name="phone"placeholder="10 digit number" >
<br><br>
<label>Address</label>
<textarea name="address" rows="3" column="30"></textarea>
<br><br>
<label>Hobbies</label><br>
<input type="checkbox" name="hobbies" value="Reading"> Reading
<input type="checkbox" name="hobbies" value="Sports"> Sports
<input type="checkbox" name="hobbies" value="Music"> Music
<br><br>

<input type="button"value="Register">

</form>

</body>
</html>
